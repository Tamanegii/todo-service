<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            width: 100%;
            max-width: 700px;
            padding: 2rem;
        }
        h1 {
            text-align: center;
            margin-bottom: 2rem;
            font-size: 1.5rem;
            font-weight: 400;
            color: #a0a0b0;
        }
        .input-area {
            display: flex;
            gap: 0.5rem;
        }
        .project-row {
            margin-bottom: 0.75rem;
        }
        .project-row input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid #333;
            border-radius: 8px;
            background: #16213e;
            color: #eee;
            font-size: 1rem;
            transition: border-color 0.2s;
        }
        .project-row input:focus {
            outline: none;
            border-color: #4a6fa5;
        }
        textarea {
            flex: 1;
            padding: 0.75rem 1rem;
            border: 1px solid #333;
            border-radius: 8px;
            background: #16213e;
            color: #eee;
            font-size: 1rem;
            resize: none;
            height: 80px;
            line-height: 1.5;
            transition: border-color 0.2s;
        }
        textarea:focus {
            outline: none;
            border-color: #4a6fa5;
        }
        button {
            padding: 0 1.5rem;
            border: none;
            border-radius: 8px;
            background: #4a6fa5;
            color: #fff;
            font-size: 1.1rem;
            cursor: pointer;
            transition: background 0.2s;
            white-space: nowrap;
            height: 80px;
        }
        button:hover { background: #5a8fbf; }
        button:active { background: #3a5f95; }
        button:disabled { background: #333; cursor: not-allowed; }
</style>
</head>
<body>
    <div class="container">
        <h1>Quick Todo</h1>
        <div class="project-row">
            <input id="project" type="text" placeholder="项目名称（选填，不填则进收件箱）">
        </div>
        <div class="input-area">
            <textarea id="input" placeholder="明天下午3点 开会 重要 1小时" rows="1"></textarea>
            <button id="send">发送</button>
        </div>
        <div id="toast" style="text-align:center;margin-top:1rem;min-height:1.5rem;color:#a0a0b0;"></div>
    </div>
    <script>
        const input = document.getElementById('input');
        const project = document.getElementById('project');
        const btn = document.getElementById('send');
        const toast = document.getElementById('toast');

        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                send();
            }
        });
        btn.addEventListener('click', send);

        async function send() {
            const text = input.value.trim();
            if (!text) return;
            btn.disabled = true;
            toast.textContent = '';
            try {
                const res = await fetch('/api/v1/messages', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text, session_id: 'web', project_id: project.value.trim() || null })
                });
                if (res.status === 401) {
                    toast.textContent = '认证失败，请登录';
                    toast.style.color = '#e74c3c';
                } else if (res.ok || res.status === 202) {
                    toast.textContent = '已发送';
                    toast.style.color = '#2ecc71';
                    input.value = '';
                } else {
                    toast.textContent = '发送失败';
                    toast.style.color = '#e74c3c';
                }
            } catch {
                toast.textContent = '网络错误';
                toast.style.color = '#e74c3c';
            }
            btn.disabled = false;
            setTimeout(() => { toast.textContent = ''; }, 3000);
        }
    </script>
</body>
</html>
